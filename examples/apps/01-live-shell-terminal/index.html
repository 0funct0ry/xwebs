<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>xwebs · Live Shell Terminal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Custom scrollbar */
    #output::-webkit-scrollbar { width: 6px; }
    #output::-webkit-scrollbar-track { background: #0a0a0a; }
    #output::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
    #output::-webkit-scrollbar-thumb:hover { background: #555; }

    /* Blinking cursor */
    .cursor {
      display: inline-block;
      width: 8px;
      height: 15px;
      background: #22c55e;
      animation: blink 1.1s step-end infinite;
      vertical-align: text-bottom;
      margin-left: 1px;
    }
    @keyframes blink { 50% { opacity: 0; } }

    /* Spinner */
    .spinner {
      display: inline-block;
      width: 12px;
      height: 12px;
      border: 2px solid #333;
      border-top-color: #22c55e;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Terminal font */
    .mono { font-family: 'Fira Code', 'Cascadia Code', 'JetBrains Mono', 'Menlo', 'Courier New', monospace; }

    /* ANSI-like color classes */
    .text-stdout { color: #e2e8f0; }
    .text-stderr  { color: #f87171; }
    .text-cmd     { color: #22c55e; }
    .text-info    { color: #6b7280; }
    .text-warning { color: #fbbf24; }
  </style>
</head>
<body class="h-full bg-[#0d0d0d] text-slate-200 flex flex-col">

  <!-- ── Top Bar ─────────────────────────────────────────────────────────── -->
  <header class="flex items-center justify-between px-4 py-2 bg-[#111] border-b border-[#222] shrink-0">
    <div class="flex items-center gap-3">
      <!-- Traffic-light dots -->
      <span class="w-3 h-3 rounded-full bg-red-500 opacity-80"></span>
      <span class="w-3 h-3 rounded-full bg-yellow-400 opacity-80"></span>
      <span class="w-3 h-3 rounded-full bg-green-500 opacity-80"></span>
      <span class="ml-2 text-sm text-slate-400 mono">xwebs · live shell terminal</span>
    </div>

    <div class="flex items-center gap-4">
      <!-- Connection URL -->
      <div class="flex items-center gap-2">
        <span class="text-xs text-slate-500">server</span>
        <input id="ws-url" type="text" value="ws://localhost:8080/"
          class="mono text-xs bg-[#1a1a1a] border border-[#2a2a2a] rounded px-2 py-1 text-slate-300 focus:outline-none focus:border-green-600 w-52" />
        <button id="btn-connect"
          class="text-xs px-3 py-1 rounded bg-green-700 hover:bg-green-600 text-white transition-colors">
          Connect
        </button>
      </div>

      <!-- Status badge -->
      <div id="status-badge" class="flex items-center gap-1.5 text-xs px-2 py-1 rounded-full bg-[#1a1a1a] border border-[#2a2a2a]">
        <span id="status-dot" class="w-2 h-2 rounded-full bg-red-500"></span>
        <span id="status-text" class="text-slate-400">disconnected</span>
      </div>

      <!-- Clear button -->
      <button id="btn-clear" title="Clear terminal (Ctrl+L)"
        class="text-xs px-3 py-1 rounded bg-[#1a1a1a] hover:bg-[#222] border border-[#2a2a2a] text-slate-400 hover:text-slate-200 transition-colors">
        clear
      </button>
    </div>
  </header>

  <!-- ── Terminal Output ─────────────────────────────────────────────────── -->
  <main id="output" class="flex-1 overflow-y-auto px-4 py-3 mono text-sm leading-relaxed">
    <!-- Welcome banner -->
    <div class="text-info mb-1"></div>
    <div class="text-info mb-1">xwebs · Live Shell Terminal</div>
    <div class="text-info mb-1">Commands execute on the xwebs server process.</div>
    <div class="text-info mb-1">Type <span class="text-warning">help</span> for built-ins. <span class="text-warning">clear</span> or Ctrl+L to reset.</div>
    <div class="text-info mb-3"></div>
  </main>

  <!-- ── Input Bar ───────────────────────────────────────────────────────── -->
  <footer class="shrink-0 border-t border-[#222] bg-[#111] px-4 py-3">
    <form id="cmd-form" class="flex items-center gap-3">
      <span class="text-cmd mono text-sm select-none">$</span>
      <input id="cmd-input" type="text" autocomplete="off" spellcheck="false"
        placeholder="enter a shell command…"
        disabled
        class="flex-1 mono text-sm bg-transparent text-slate-100 placeholder-slate-600 focus:outline-none disabled:opacity-40" />
      <div id="spinner" class="hidden spinner"></div>
      <button type="submit" id="btn-run" disabled
        class="text-xs px-4 py-1.5 rounded bg-green-700 hover:bg-green-600 disabled:opacity-30 disabled:cursor-not-allowed text-white transition-colors">
        run
      </button>
    </form>

    <!-- History hint -->
    <div class="flex items-center justify-between mt-1.5">
      <span class="text-xs text-slate-600">↑ ↓  history &nbsp;·&nbsp; Ctrl+L  clear &nbsp;·&nbsp; Ctrl+C  cancel</span>
      <span id="cmd-count" class="text-xs text-slate-600 mono">0 commands</span>
    </div>
  </footer>

  <script>
  (() => {
    // ── Config ────────────────────────────────────────────────────────────
    const WS_URL_KEY   = 'xwebs_terminal_url';
    const MAX_HISTORY  = 200;
    const RECONNECT_MS = 2500;

    // ── State ─────────────────────────────────────────────────────────────
    let ws              = null;
    let connected       = false;
    let pending         = false;       // waiting for a response
    let history         = [];          // command history
    let historyIdx      = -1;
    let cmdCount        = 0;
    let reconnectTimer  = null;
    let intentionalClose = false;      // true when connect() closes the old socket itself

    // ── DOM refs ──────────────────────────────────────────────────────────
    const output     = document.getElementById('output');
    const form       = document.getElementById('cmd-form');
    const input      = document.getElementById('cmd-input');
    const spinner    = document.getElementById('spinner');
    const btnRun     = document.getElementById('btn-run');
    const btnClear   = document.getElementById('btn-clear');
    const btnConnect = document.getElementById('btn-connect');
    const wsUrlInput = document.getElementById('ws-url');
    const statusDot  = document.getElementById('status-dot');
    const statusText = document.getElementById('status-text');
    const cmdCountEl = document.getElementById('cmd-count');

    // Restore saved URL
    const savedUrl = localStorage.getItem(WS_URL_KEY);
    if (savedUrl) wsUrlInput.value = savedUrl;

    // ── WebSocket lifecycle ───────────────────────────────────────────────
    function connect() {
      clearTimeout(reconnectTimer);

      // Close any existing socket without triggering a reconnect loop
      if (ws && ws.readyState <= 1) {
        intentionalClose = true;
        ws.close();
      }

      const url = wsUrlInput.value.trim();
      localStorage.setItem(WS_URL_KEY, url);

      setStatus('connecting');
      appendInfo(`Connecting to ${url}…`);

      try {
        ws = new WebSocket(url);
      } catch (e) {
        appendInfo(`Invalid URL: ${e.message}`, 'error');
        setStatus('disconnected');
        scheduleReconnect();
        return;
      }

      intentionalClose = false;

      ws.onopen = () => {
        connected = true;
        setStatus('connected');
        appendInfo('Connected. Ready.');
        enableInput();
        input.focus();
      };

      ws.onclose = (e) => {
        connected = false;
        pending   = false;
        setStatus('disconnected');
        disableInput();
        // Skip reconnect when connect() itself triggered the close
        if (intentionalClose) { intentionalClose = false; return; }
        appendInfo(`Disconnected (code ${e.code}). Reconnecting…`);
        scheduleReconnect();
      };

      ws.onerror = () => {
        appendInfo('WebSocket error.', 'error');
      };

      ws.onmessage = (event) => {
        handleResponse(event.data);
      };
    }

    function scheduleReconnect() {
      clearTimeout(reconnectTimer);
      reconnectTimer = setTimeout(connect, RECONNECT_MS);
    }

    // ── Status UI ─────────────────────────────────────────────────────────
    function setStatus(state) {
      const map = {
        connecting:   { dot: 'bg-yellow-400', text: 'connecting…' },
        connected:    { dot: 'bg-green-500',  text: 'connected'   },
        disconnected: { dot: 'bg-red-500',    text: 'disconnected'},
      };
      const s = map[state] || map.disconnected;
      statusDot.className  = `w-2 h-2 rounded-full ${s.dot}`;
      statusText.textContent = s.text;
    }

    // ── Input state ───────────────────────────────────────────────────────
    function enableInput() {
      input.disabled  = false;
      btnRun.disabled = false;
    }

    function disableInput() {
      input.disabled  = true;
      btnRun.disabled = true;
      spinner.classList.add('hidden');
    }

    function setBusy(busy) {
      pending         = busy;
      input.disabled  = busy;
      btnRun.disabled = busy;
      spinner.classList.toggle('hidden', !busy);
    }

    // ── Terminal output helpers ───────────────────────────────────────────
    function escape(str) {
      return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function appendLine(html, extraClass = '') {
      const div = document.createElement('div');
      div.className = extraClass;
      div.innerHTML = html;
      output.appendChild(div);
      output.scrollTop = output.scrollHeight;
    }

    function appendInfo(msg, type = 'info') {
      const cls = type === 'error' ? 'text-stderr' : 'text-info';
      appendLine(`<span class="${cls}">// ${escape(msg)}</span>`);
    }

    function renderBlock(cmd, stdout, stderr, exitCode) {
      // Prompt line
      const exitColor = exitCode !== 0 ? 'text-warning' : 'text-cmd';
      appendLine(
        `<span class="${exitColor}">$</span> <span class="text-cmd">${escape(cmd)}</span>`,
        'mt-2'
      );

      // stdout
      if (stdout) {
        const lines = stdout.split('\n');
        lines.forEach(line => {
          if (line) appendLine(`<span class="text-stdout">${escape(line)}</span>`);
        });
      }

      // stderr
      if (stderr) {
        const lines = stderr.split('\n');
        lines.forEach(line => {
          if (line) appendLine(`<span class="text-stderr">${escape(line)}</span>`);
        });
      }

      // exit code badge (only on non-zero)
      if (exitCode !== 0) {
        appendLine(
          `<span class="text-xs text-warning bg-yellow-900/40 px-1.5 py-0.5 rounded">exit ${exitCode}</span>`,
          'mt-0.5'
        );
      }
    }

    // ── Built-in client-side commands ─────────────────────────────────────
    const BUILTINS = {
      clear: () => { clearOutput(); return true; },
      help:  () => {
        appendLine(`<span class="text-info">
Built-in commands (handled client-side):</span>`);
        appendLine(`<span class="text-warning">  clear</span><span class="text-info">     — clear the terminal</span>`);
        appendLine(`<span class="text-warning">  help</span><span class="text-info">      — show this message</span>`);
        appendLine(`<span class="text-info">
All other input is forwarded to the xwebs server as a shell command.</span>`);
        return true;
      },
    };

    function clearOutput() {
      output.innerHTML = '';
      appendInfo('Terminal cleared.');
    }

    // ── Command submission ────────────────────────────────────────────────
    function submitCommand(cmd) {
      cmd = cmd.trim();
      if (!cmd) return;

      // Add to history
      if (history[history.length - 1] !== cmd) {
        history.push(cmd);
        if (history.length > MAX_HISTORY) history.shift();
      }
      historyIdx = history.length;

      cmdCount++;
      cmdCountEl.textContent = `${cmdCount} command${cmdCount !== 1 ? 's' : ''}`;
      input.value = '';

      // Built-in?
      if (BUILTINS[cmd]) {
        BUILTINS[cmd]();
        return;
      }

      // Send to server
      if (!connected) {
        appendInfo('Not connected. Waiting for reconnect…', 'error');
        return;
      }

      setBusy(true);
      ws.send(cmd);
    }

    // ── Response handler ──────────────────────────────────────────────────
    function handleResponse(raw) {
      setBusy(false);
      enableInput();
      input.focus();

      let data;
      try {
        data = JSON.parse(raw);
      } catch {
        // Raw string fallback
        appendLine(`<span class="text-stdout">${escape(raw)}</span>`);
        return;
      }

      renderBlock(
        data.cmd    || '',
        data.stdout || '',
        data.stderr || '',
        data.exit   ?? 0
      );
    }

    // ── Form submit ───────────────────────────────────────────────────────
    form.addEventListener('submit', (e) => {
      e.preventDefault();
      if (!pending) submitCommand(input.value);
    });

    // ── Keyboard shortcuts ────────────────────────────────────────────────
    input.addEventListener('keydown', (e) => {
      // History navigation
      if (e.key === 'ArrowUp') {
        e.preventDefault();
        if (history.length === 0) return;
        historyIdx = Math.max(0, historyIdx - 1);
        input.value = history[historyIdx] || '';
        setTimeout(() => input.setSelectionRange(input.value.length, input.value.length), 0);
        return;
      }
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        historyIdx = Math.min(history.length, historyIdx + 1);
        input.value = historyIdx < history.length ? history[historyIdx] : '';
        return;
      }
      // Ctrl+C — cancel pending
      if (e.ctrlKey && e.key === 'c') {
        if (pending) {
          setBusy(false);
          enableInput();
          appendInfo('Cancelled (client-side only — server command may still run).');
        } else {
          input.value = '';
        }
        return;
      }
    });

    // Global Ctrl+L to clear
    document.addEventListener('keydown', (e) => {
      if (e.ctrlKey && e.key === 'l') {
        e.preventDefault();
        clearOutput();
      }
    });

    // Clear button
    btnClear.addEventListener('click', clearOutput);

    // Connect button
    btnConnect.addEventListener('click', () => {
      clearTimeout(reconnectTimer);
      connect();
    });

    // Connect on Enter in URL field
    wsUrlInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { clearTimeout(reconnectTimer); connect(); }
    });

    // ── Boot ──────────────────────────────────────────────────────────────
    connect();
  })();
  </script>
</body>
</html>
