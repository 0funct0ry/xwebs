# pipeline_test.yaml
handlers:
  - name: pipeline-test
    match: "pipeline"
    pipeline:
      - run: echo "hello" | tr '[:lower:]' '[:upper:]'
        as: step1
      - run: echo "{{.Steps.step1.Stdout | trim}} world"
        as: step2
    respond: |
      {
        "step1": "{{.Steps.step1.Stdout | trim}}",
        "step2": "{{.Steps.step2.Stdout | trim}}"
      }

  - name: pipeline-failure-handling
    match: "pipeline_error"
    pipeline:
      - run: echo "error step"; exit 2
        as: failed_step
        ignore_error: true
      - run: echo "rescued after exit code {{.Steps.failed_step.ExitCode}}"
        as: rescue_step
    respond: |
      {
        "failed_status": {{.Steps.failed_step.ExitCode}},
        "final_output": "{{.Steps.rescue_step.Stdout | trim}}"
      }

  - name: shorthand-test
    match: "shorthand"
    run: echo "shorthand execute"
    respond: '{"status": "ok", "output": "{{.Stdout | trim}}"}'

  - name: builtin-test
    match: "builtin"
    builtin: echo
    respond: '{"builtin": "echoed", "data": "{{.Message}}"}'
